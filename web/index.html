<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniFi SoftCenter - 安全管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.359.0/dist/umd/lucide.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #F5F5F7; color: #1D1D1F; }
        .glass { background: rgba(255, 255, 255, 0.72); backdrop-filter: saturate(180%) blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .safe-area { max-width: 1200px; margin: 0 auto; }
        .btn-apple { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-apple:active { transform: scale(0.96); }
        .terminal-scroll::-webkit-scrollbar { width: 8px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 8px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 8px; }
    </style>
</head>
<body class="antialiased">
    <div id="app" class="min-h-screen pb-20">
        <nav class="sticky top-0 z-50 glass border-b border-gray-200 mb-8">
            <div class="safe-area px-6 h-16 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
                    <span class="font-semibold text-lg tracking-tight">SoftCenter</span>
                    <span class="text-[10px] text-gray-400 font-mono mt-1">Build {{ sysInfo.Version }}</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button @click="showSystemLogs" class="bg-black text-white px-3 py-1.5 rounded-lg text-xs font-medium flex items-center shadow-sm hover:bg-gray-800 transition-colors">
                        <i data-lucide="terminal" class="w-4 h-4 mr-1.5"></i> 核心日志
                    </button>
                    <div class="flex items-center bg-gray-100 rounded-full px-3 py-1 border border-gray-200">
                        <i data-lucide="key" class="w-4 h-4 text-gray-400 mr-2"></i>
                        <input type="password" v-model="token" placeholder="输入访问令牌" @keyup.enter="onTokenSubmit" @blur="onTokenSubmit" class="bg-transparent border-none text-xs focus:outline-none w-32">
                    </div>
                </div>
            </div>
        </nav>

        <main class="safe-area px-6">
            <div class="mb-12">
                <h2 class="text-3xl font-semibold mb-2">欢迎回来</h2>
                <p class="text-gray-500">UniFi Cloud Gateway Fiber 正在安全运行</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                <div v-for="app in apps" :key="app.id" class="glass rounded-[2rem] p-6 shadow-sm hover:shadow-md transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <div :class="app.isRunning ? 'bg-blue-600' : 'bg-gray-400'" class="w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-lg transition-colors">
                            <i :data-lucide="app.icon" class="w-7 h-7"></i>
                        </div>
                        <button @click="toggleApp(app)" :class="app.isRunning ? 'bg-[#34C759]' : 'bg-[#E9E9EA]'" class="w-12 h-7 rounded-full relative p-1 transition-colors">
                            <div :class="app.isRunning ? 'translate-x-5' : 'translate-x-0'" class="w-5 h-5 bg-white rounded-full shadow-sm transform transition-transform"></div>
                        </button>
                    </div>

                    <h3 class="text-xl font-semibold mb-1">{{ app.name }}</h3>
                    <p class="text-xs text-gray-400 font-medium uppercase tracking-widest mb-6">{{ app.type }}</p>

                    <div class="space-y-3 mb-6 bg-white/40 rounded-2xl p-4 border border-white/50 text-sm">
                        <div class="flex justify-between items-center">
                            <span class="text-gray-500">开机自启</span>
                            <input type="checkbox" v-model="app.autoStart" @change="saveAutoStart(app)" class="accent-blue-600">
                        </div>
                    </div>

                    <div class="flex space-x-2">
                        <button @click="openConfig(app)" :disabled="!app.configKeys" :class="!app.configKeys ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-50'" class="btn-apple flex-1 bg-white border border-gray-200 py-2.5 rounded-xl text-sm font-medium transition-all">配置</button>
                        <button @click="showLogModal(app)" :disabled="!app.logPath" :class="!app.logPath ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-50'" class="btn-apple px-4 bg-white border border-gray-200 py-2.5 rounded-xl transition-all">
                            <i data-lucide="file-text" class="w-4 h-4"></i>
                        </button>
                        <button @click="showCronModal(app)" class="btn-apple px-4 bg-white border border-gray-200 py-2.5 rounded-xl hover:bg-gray-50">
                            <i data-lucide="clock" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <div @click="openAddModal" class="glass rounded-[2rem] p-6 flex flex-col items-center justify-center cursor-pointer border-2 border-dashed border-gray-300 hover:border-blue-500 hover:bg-white/50 transition-all min-h-[280px] group">
                    <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 group-hover:text-blue-500 group-hover:bg-blue-50 transition-all mb-4">
                        <i data-lucide="plus" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-lg font-medium text-gray-500 group-hover:text-blue-600">添加新应用</h3>
                </div>
            </div>

            <section class="mt-12">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-2xl font-semibold">系统定时任务 (Crontab)</h3>
                    <button @click="loadCronJobs" class="text-sm text-blue-600 font-medium hover:underline">刷新</button>
                </div>
                <div class="glass rounded-[2rem] overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50/50 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                <th class="px-6 py-4">周期</th><th class="px-6 py-4">命令</th><th class="px-6 py-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr v-if="cronJobs.length === 0"><td colspan="3" class="px-6 py-8 text-center text-gray-400 text-sm">暂无任务</td></tr>
                            <tr v-for="job in cronJobs" :key="job.id" class="text-sm hover:bg-white/40">
                                <td class="px-6 py-4"><code>{{ job.schedule }}</code></td>
                                <td class="px-6 py-4 font-mono text-xs">{{ job.command }}</td>
                                <td class="px-6 py-4 text-right"><button @click="deleteCron(job.id)" class="text-red-500 font-medium">删除</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

<div v-if="showAddModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm">
    <div class="glass w-full max-w-2xl rounded-[2.5rem] p-8 shadow-2xl flex flex-col max-h-[90vh]">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-semibold">应用库</h3>
            <div class="flex space-x-2 bg-gray-100 p-1 rounded-xl">
                <button @click="addTab = 'online'" :class="addTab === 'online' ? 'bg-white shadow-sm' : 'text-gray-500'" class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all">在线拉取</button>
                <button @click="addTab = 'local'" :class="addTab === 'local' ? 'bg-white shadow-sm' : 'text-gray-500'" class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all">手动配置</button>
            </div>
        </div>

        <div class="overflow-y-auto flex-1 pr-2">
            <div v-if="addTab === 'online'" class="space-y-4">
                <div v-if="isFetchingStore" class="text-center py-8 text-gray-500">同步中...</div>
                <div v-for="pkg in onlineStore" :key="pkg.Id" class="flex items-center justify-between p-4 bg-white/60 rounded-2xl border border-gray-100">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center"><i :data-lucide="pkg.Icon" class="w-5 h-5"></i></div>
                        <div><h4 class="font-semibold">{{ pkg.Name }}</h4><p class="text-xs text-gray-500">{{ pkg.Id }}</p></div>
                    </div>
                    <button @click="installApp(pkg)" class="bg-black text-white px-4 py-2 rounded-xl text-sm font-medium">安装</button>
                </div>
            </div>

            <div v-if="addTab === 'local'" class="space-y-4 text-sm mt-4">
                <div class="grid grid-cols-2 gap-4">
                    <input v-model="newApp.Id" placeholder="应用 ID" class="w-full bg-gray-100 rounded-xl px-4 py-2.5 outline-none">
                    <input v-model="newApp.Name" placeholder="显示名称" class="w-full bg-gray-100 rounded-xl px-4 py-2.5 outline-none">
                    <input v-model="newApp.Icon" placeholder="图标 (Lucide)" class="w-full bg-gray-100 rounded-xl px-4 py-2.5 outline-none">
                    <input v-model="newApp.ConfigPath" placeholder="参数文件路径" class="w-full bg-gray-100 rounded-xl px-4 py-2.5 outline-none">
                </div>
                <input v-model="newApp.StatusCommand" placeholder="状态探针命令" class="w-full bg-gray-100 rounded-xl px-4 py-2.5 outline-none font-mono text-xs">
                <input v-model="newApp.StartCommand" placeholder="启动命令" class="w-full bg-gray-100 rounded-xl px-4 py-2.5 outline-none font-mono text-xs">
                <input v-model="newApp.StopCommand" placeholder="停止命令" class="w-full bg-gray-100 rounded-xl px-4 py-2.5 outline-none font-mono text-xs">
                <button @click="installApp(newApp)" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-medium">保存本地配置</button>
            </div>
        </div>
        <div class="flex space-x-3 mt-6"><button @click="showAddModal = false" class="flex-1 py-3 font-medium border rounded-2xl">取消</button></div>
        <div v-if="logModalApp" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm">
            <div class="w-full max-w-4xl bg-[#1e1e1e] rounded-[1.5rem] shadow-2xl flex flex-col h-[80vh]">
                <div class="h-12 flex items-center justify-between px-4 bg-[#2d2d2d] rounded-t-[1.5rem]">
                    <div class="flex space-x-2"><div @click="logModalApp = null" class="w-3 h-3 rounded-full bg-red-500 cursor-pointer"></div></div>
                    <div class="text-gray-400 text-xs font-mono">{{ logModalApp.name }} 日志</div>
                    <button @click="refreshLogs"><i data-lucide="refresh-cw" :class="{'animate-spin': isLoadingLogs}" class="w-4 h-4 text-white"></i></button>
                </div>
                <div id="logContainer" class="flex-1 overflow-y-auto p-4 terminal-scroll bg-[#1e1e1e] rounded-b-[1.5rem]">
                    <pre class="text-[#00ff00] font-mono text-xs whitespace-pre-wrap">{{ logContent }}</pre>
                </div>
            </div>
        </div>
    </div>
    <script>
        const { createApp, ref, onMounted, nextTick, watch } = Vue;

        createApp({
            setup() {
                const token = ref(localStorage.getItem('sc_token') || '');
                const apps = ref([]);
                const cronJobs = ref([]);
                const activeApp = ref(null);
                const appConfig = ref({});
                const showAddModal = ref(false);
                const addTab = ref('online');
                const isFetchingStore = ref(false);
                const onlineStore = ref([]);
                const logModalApp = ref(null);
                const logContent = ref('');
                const isLoadingLogs = ref(false);

                const callApi = async (url, method = 'GET', body = null) => {
                    if (!token.value) return null;
                    localStorage.setItem('sc_token', token.value);
                    try {
                        const res = await fetch(url, { method, headers: { 'Authorization': token.value, 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : null });
                        if (res.status === 401) throw new Error('令牌错误');
                        return await res.json();
                    } catch (e) { console.error(e.message); return null; }
                };

                const loadRealApps = async () => {
                    const data = await callApi('/api/apps');
                    if (data) {
                        apps.value = data.map(i => ({
                            id: i.Id, name: i.Name, type: i.Type, icon: i.Icon,
                            startCommand: i.StartCommand, autoStart: i.IsAutoStart === 1,
                            isRunning: i.IsRunning, configPath: i.ConfigPath,
                            configKeys: i.ConfigKeys, logPath: i.LogPath
                        }));
                        nextTick(() => lucide.createIcons());
                    }
                };

                const startPolling = () => { setInterval(loadRealApps, 3000); };

                const fetchOnlineStore = async () => {
                    isFetchingStore.value = true;
                    try {
                        const res = await fetch('https://raw.githubusercontent.com/fw867/unifi-softcenterstore/master/apps/apps.json');
                        onlineStore.value = await res.json();
                    } catch (e) { console.error(e); } finally { isFetchingStore.value = false; }
                };

                const toggleApp = async (app) => {
                    const action = app.isRunning ? 'stop' : 'start';
                    await callApi(`/api/apps/${app.id}/control?action=${action}`, 'POST');
                };

                const showSystemLogs = async () => {
                    logModalApp.value = { id: 'sys', name: '系统核心' };
                    await refreshLogs();
                };

                const showLogModal = async (app) => {
                    logModalApp.value = app;
                    await refreshLogs();
                };

                const refreshLogs = async () => {
                    isLoadingLogs.value = true;
                    const url = logModalApp.value.id === 'sys' ? '/api/system/logs' : `/api/apps/${logModalApp.value.id}/logs`;
                    const data = await callApi(url);
                    logContent.value = data?.Content || '暂无内容';
                    isLoadingLogs.value = false;
                    nextTick(() => { const c = document.getElementById('logContainer'); if(c) c.scrollTop = c.scrollHeight; });
                };

                const sysInfo = ref({ Version: '0.0.0' });

                const loadSystemInfo = async () => {
                    const data = await callApi('/api/system/info');
                    if (data) sysInfo.value = data;
                };

                onMounted(() => { if (token.value) { loadRealApps(); startPolling(); loadSystemInfo(); loadCronJobs(); } lucide.createIcons(); });

                return { token, apps, cronJobs, activeApp, appConfig, showAddModal, addTab, isFetchingStore, onlineStore, logModalApp, logContent, isLoadingLogs, onTokenSubmit: loadRealApps, toggleApp, openAddModal: () => { showAddModal.value = true; fetchOnlineStore(); }, showSystemLogs, showLogModal, refreshLogs, installApp: async (p) => { await callApi('/api/apps', 'POST', p); showAddModal.value = false; loadRealApps(); }, sysInfo };
            }
        }).mount('#app');
    </script>
</body>
</html>
