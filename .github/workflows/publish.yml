name: Build and Publish SoftCenter

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_VERSION: "1.0.${{ github.run_number }}"
      RELEASE_TAG: "v1.0.${{ github.run_number }}"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Cross-Compilation Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu zlib1g-dev:amd64 zip

    - name: Install Dependencies
      run: dotnet restore

    - name: Publish Native AOT (linux-arm64)
      run: |
        dotnet publish -c Release -r linux-arm64 --self-contained true \
        /p:PublishAot=true \
        /p:Version=${{ env.APP_VERSION }} \
        /p:InformationalVersion=${{ env.APP_VERSION }} \
        /p:ObjCopyName=aarch64-linux-gnu-objcopy

    - name: Zip the build
      run: |
        cp -r web bin/Release/net10.0/linux-arm64/publish/ || true
        cd bin/Release/net10.0/linux-arm64/publish/
        zip -r "$GITHUB_WORKSPACE/SoftCenter-v${{ env.APP_VERSION }}-arm64.zip" \
            SoftCenterManager \
            libe_sqlite3.so \
            web/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Release ${{ env.RELEASE_TAG }}
        draft: false
        prerelease: false
        files: SoftCenter-v${{ env.APP_VERSION }}-arm64.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}