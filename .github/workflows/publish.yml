name: Build and Publish SoftCenter

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:11
    env:
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

    steps:
    - name: Prepare Container Environment
      env:
        DEBIAN_FRONTEND: noninteractive 
      run: |
        dpkg --add-architecture arm64
        apt-get update
        apt-get install -y git curl zip unzip clang gcc gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu zlib1g-dev:arm64 ca-certificates libicu-dev

    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine Version Logic
      shell: bash
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          TAG_NAME="${{ github.ref_name }}"
          echo "RELEASE_TAG=$TAG_NAME" >> $GITHUB_ENV
          echo "APP_VERSION=${TAG_NAME#v}" >> $GITHUB_ENV
          echo "🚀 Triggered by Git Tag. Building version: $TAG_NAME"
        else
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          
          LATEST_TAG=${LATEST_TAG:-v1.0.0}
          
          VER_NUM=${LATEST_TAG#v}
          
          IFS='.' read -r -a PARTS <<< "$VER_NUM"
          MAJOR="${PARTS[0]:-1}"
          MINOR="${PARTS[1]:-0}"
          PATCH="${PARTS[2]:-0}"
          
          NEW_PATCH=$((PATCH + 1))
          APP_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          RELEASE_TAG="v$APP_VERSION"
          
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "🛠️ Triggered manually. Latest tag was $LATEST_TAG. Auto-incremented to: $RELEASE_TAG"
        fi

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Dependencies
      run: dotnet restore

    - name: Publish Native AOT (linux-arm64)
      run: |
        dotnet publish -c Release -r linux-arm64 --self-contained true \
        /p:PublishAot=true \
        /p:Version=${{ env.APP_VERSION }} \
        /p:InformationalVersion=${{ env.APP_VERSION }} \
        /p:ObjCopyName=aarch64-linux-gnu-objcopy

    - name: Zip the build
      run: |
        cp -r web bin/Release/net10.0/linux-arm64/publish/ || true
        cd bin/Release/net10.0/linux-arm64/publish/
        zip -r "$GITHUB_WORKSPACE/SoftCenter-${{ env.RELEASE_TAG }}-arm64.zip" \
            SoftCenterManager \
            libe_sqlite3.so \
            web/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Release ${{ env.RELEASE_TAG }}
        draft: false
        prerelease: false
        files: SoftCenter-${{ env.RELEASE_TAG }}-arm64.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}